<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams Transcript Downloader v3</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Teams Transcript</h1>
      <p class="subtitle">Téléchargement automatique en arrière-plan</p>
    </header>

    <div class="settings">
      <label class="switch-row" for="auto-switch">
        <span class="switch-label">
          Automatisation
          <small id="auto-desc">Démarre tout de suite, puis re-scan toutes les 5 min</small>
        </span>
        <span class="switch">
          <input type="checkbox" id="auto-switch">
          <span class="slider"></span>
        </span>
      </label>

      <label class="field-row" for="max-chats">
        <span class="switch-label">
          Discussions à scanner
          <small>Les N premières (0 = toutes)</small>
        </span>
        <input type="number" id="max-chats" min="0" max="500" step="1" value="50">
      </label>

      <label class="field-row" for="interval-min">
        <span class="switch-label">
          Intervalle entre scans
          <small>en minutes (min. 1)</small>
        </span>
        <input type="number" id="interval-min" min="1" max="240" step="1" value="5">
      </label>
    </div>

    <div id="status-container" class="status-container">
      <div class="status-line">
        <span id="loader" class="loader hidden"></span>
        <div id="status-message" class="status-message">
          Chargement…
        </div>
      </div>
      <div id="progress-wrap" class="progress-wrap hidden">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <div id="summary" class="summary hidden"></div>
    </div>

    <div class="actions">
      <button id="stop-btn" class="btn btn-danger hidden" style="margin-top:10px;">
        <span class="icon">⏹</span>
        Arrêter
      </button>

      <button id="extract-btn" class="btn btn-secondary" style="margin-top:10px;">
        <span class="icon">📋</span>
        Extraire manuellement (onglet actif)
      </button>
    </div>

    <section class="run-log-section">
      <h3>Journal des scans</h3>
      <div id="run-log" class="run-log"></div>
    </section>

    <footer>
      <button id="reset-btn" class="btn" style="font-size:11px;padding:4px 8px;margin-bottom:6px;background:#a33;color:#fff;">Réinitialiser l'historique</button>
      <button id="debug-btn" class="btn hidden" style="font-size:11px;padding:4px 8px;margin-bottom:6px;background:#666;color:#fff;">Debug DOM</button>
      <button id="debug-meeting-btn" class="btn hidden" style="font-size:11px;padding:4px 8px;margin-bottom:6px;background:#558;color:#fff;">Debug réunion</button>
      <p>Teams Transcript Downloader v3.0 — Panneau latéral</p>
    </footer>
  </div>

  <script src="panel.js"></script>
</body>
</html>
