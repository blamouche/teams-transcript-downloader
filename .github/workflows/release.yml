name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build extension zip and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip_v1=teams-transcript-downloader-v1-${TAG}.zip" >> "$GITHUB_OUTPUT"
          echo "zip_v2=teams-transcript-downloader-v2-${TAG}.zip" >> "$GITHUB_OUTPUT"

      - name: Stage plugin files
        run: |
          set -euo pipefail
          for V in v1 v2; do
            STAGE="dist/teams-transcript-downloader-${V}"
            mkdir -p "${STAGE}/icons"
            cp "${V}/manifest.json" "${STAGE}/"
            cp "${V}/content.js" "${STAGE}/"
            cp "${V}/popup.html" "${STAGE}/"
            cp "${V}/popup.css" "${STAGE}/"
            cp "${V}/popup.js" "${STAGE}/"
            cp "${V}/icons/icon16.png" "${V}/icons/icon48.png" "${V}/icons/icon128.png" "${STAGE}/icons/"
            echo "Contenu du package ${V} :"
            find "${STAGE}" -type f | sort
          done

      - name: Create zip archives
        run: |
          set -euo pipefail
          cd dist
          zip -r "../${{ steps.vars.outputs.zip_v1 }}" teams-transcript-downloader-v1
          zip -r "../${{ steps.vars.outputs.zip_v2 }}" teams-transcript-downloader-v2

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.vars.outputs.zip_v1 }}
            ${{ steps.vars.outputs.zip_v2 }}
