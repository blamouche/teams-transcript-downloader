name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build extension zip and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "zip_name=teams-transcript-downloader-${TAG}.zip" >> "$GITHUB_OUTPUT"

      - name: Stage plugin files
        run: |
          set -euo pipefail
          STAGE="dist/teams-transcript-downloader"
          mkdir -p "${STAGE}/icons"
          cp manifest.json "${STAGE}/"
          cp content.js "${STAGE}/"
          cp popup.html "${STAGE}/"
          cp popup.css "${STAGE}/"
          cp popup.js "${STAGE}/"
          cp icons/icon16.png icons/icon48.png icons/icon128.png "${STAGE}/icons/"
          echo "Contenu du package :"
          find "${STAGE}" -type f | sort

      - name: Create zip archive
        run: |
          set -euo pipefail
          cd dist
          zip -r "../${{ steps.vars.outputs.zip_name }}" teams-transcript-downloader

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.vars.outputs.zip_name }}
