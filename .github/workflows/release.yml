name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

# Un seul build de release à la fois ; on n'annule pas un build en cours pour
# ne pas laisser une release à moitié publiée.
concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build extension zips and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version and tag
        id: vars
        run: |
          set -euo pipefail
          # Version applicative suivie dans le repo ; à défaut 0.0.0.
          if [ -f ".prompt-hub/version.md" ]; then
            VERSION="$(head -n1 .prompt-hub/version.md | tr -d '[:space:]')"
          else
            VERSION="0.0.0"
          fi
          SHORT_SHA="$(git rev-parse --short HEAD)"
          # Tag unique par commit -> pas de collision entre deux releases.
          TAG="v${VERSION}-${SHORT_SHA}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - name: Stage plugin files and create zips
        id: build
        run: |
          set -euo pipefail
          TAG="${{ steps.vars.outputs.tag }}"
          ZIPS=""
          # Une archive par version présente (v1, v2, v3, …). On copie l'intégralité
          # du dossier de la version pour rester agnostique aux noms de fichiers
          # (popup.* pour v1/v2, panel.* pour v3, background.js selon les versions).
          for V in v1 v2 v3; do
            [ -d "${V}" ] || continue
            [ -f "${V}/manifest.json" ] || { echo "::warning::${V}/manifest.json manquant, version ignorée"; continue; }
            STAGE="dist/teams-transcript-downloader-${V}"
            mkdir -p "${STAGE}"
            cp -R "${V}/." "${STAGE}/"
            echo "Contenu du package ${V} :"
            find "${STAGE}" -type f | sort
            ZIP="teams-transcript-downloader-${V}-${TAG}.zip"
            (cd dist && zip -r "../${ZIP}" "teams-transcript-downloader-${V}")
            ZIPS="${ZIPS}${ZIP}"$'\n'
          done
          {
            echo "zips<<EOF"
            printf '%s' "${ZIPS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: ${{ steps.build.outputs.zips }}
