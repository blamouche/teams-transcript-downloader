<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams Transcript Downloader v2</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Teams Transcript</h1>
      <p class="subtitle">Téléchargement automatique des transcripts</p>
    </header>

    <div class="settings">
      <label class="switch-row" for="auto-switch">
        <span class="switch-label">
          Automatisation
          <small>Scanner toutes les discussions Teams</small>
        </span>
        <span class="switch">
          <input type="checkbox" id="auto-switch">
          <span class="slider"></span>
        </span>
      </label>
    </div>

    <div id="status-container" class="status-container">
      <div id="status-message" class="status-message">
        Activez l'automatisation pour scanner toutes les discussions
      </div>
    </div>

    <div id="preview-container" class="preview-container hidden">
      <h3>Aperçu</h3>
      <div class="meeting-info">
        <span id="meeting-title">-</span>
        <span id="entries-count">0 entrées</span>
      </div>
      <div id="preview-content" class="preview-content"></div>
    </div>

    <div class="actions">
      <button id="auto-btn" class="btn btn-primary" disabled>
        <span class="icon">⚡</span>
        Scanner toutes les discussions
      </button>

      <button id="extract-btn" class="btn btn-secondary" style="margin-top:10px;">
        <span class="icon">📋</span>
        Extraire manuellement (panneau ouvert)
      </button>

      <div id="download-options" class="download-options hidden">
        <p class="format-label">Format:</p>
        <div class="format-buttons">
          <button id="download-json" class="btn btn-secondary">
            JSON
          </button>
          <button id="download-txt" class="btn btn-secondary">
            TXT
          </button>
        </div>
      </div>
    </div>

    <footer>
      <button id="debug-btn" class="btn" style="font-size:11px;padding:4px 8px;margin-bottom:6px;background:#666;color:#fff;">Debug DOM</button>
      <p>Teams Transcript Downloader v2.0 — Auto</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
