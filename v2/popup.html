<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teams Transcript Downloader v2</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Teams Transcript</h1>
      <p class="subtitle">Téléchargement automatique en arrière-plan</p>
    </header>

    <div class="settings">
      <label class="switch-row" for="auto-switch">
        <span class="switch-label">
          Automatisation
          <small>Démarre tout de suite, puis re-scan toutes les 1 min</small>
        </span>
        <span class="switch">
          <input type="checkbox" id="auto-switch">
          <span class="slider"></span>
        </span>
      </label>

      <label class="switch-row" for="meetings-only" style="margin-top:12px;padding-top:12px;border-top:1px solid #eee;">
        <span class="switch-label">
          Réunions uniquement
          <small>Ignore les chats individuels et de groupe</small>
        </span>
        <span class="switch">
          <input type="checkbox" id="meetings-only">
          <span class="slider"></span>
        </span>
      </label>

      <label class="field-row" for="max-chats">
        <span class="switch-label">
          Discussions à scanner
          <small>Les N premières (0 = toutes)</small>
        </span>
        <input type="number" id="max-chats" min="0" max="500" step="1" value="50">
      </label>
    </div>

    <div id="status-container" class="status-container">
      <div id="status-message" class="status-message">
        Chargement…
      </div>
      <div id="progress-wrap" class="progress-wrap hidden">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
    </div>

    <div class="actions">
      <button id="auto-btn" class="btn btn-primary">
        <span class="icon">⚡</span>
        Scanner maintenant
      </button>

      <button id="stop-btn" class="btn btn-danger hidden" style="margin-top:10px;">
        <span class="icon">⏹</span>
        Arrêter
      </button>

      <button id="extract-btn" class="btn btn-secondary" style="margin-top:10px;">
        <span class="icon">📋</span>
        Extraire manuellement (onglet actif)
      </button>
    </div>

    <footer>
      <button id="reset-btn" class="btn" style="font-size:11px;padding:4px 8px;margin-bottom:6px;background:#a33;color:#fff;">Réinitialiser l'historique</button>
      <button id="debug-btn" class="btn" style="font-size:11px;padding:4px 8px;margin-bottom:6px;background:#666;color:#fff;">Debug DOM</button>
      <button id="debug-meeting-btn" class="btn" style="font-size:11px;padding:4px 8px;margin-bottom:6px;background:#558;color:#fff;">Debug réunion</button>
      <p>Teams Transcript Downloader v2.0 — Auto</p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
